<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IHarbor Admin - Orders</title>
    <link rel="stylesheet" href="admin.css">
</head>
<body>

    <!-- Login Screen -->
    <div id="login-screen" class="login-screen">
        <div class="login-box">
            <h1>IHarbor Admin</h1>
            <p>Enter the admin password to view orders.</p>
            <input type="password" id="admin-password" placeholder="Password" />
            <button onclick="checkLogin()">Login</button>
            <p id="login-error" class="login-error"></p>
        </div>
    </div>

    <!-- Admin Dashboard -->
    <div id="admin-dashboard" class="admin-dashboard" style="display:none;">
        <header class="admin-header">
            <h1>IHarbor — Orders</h1>
            <div class="admin-actions">
                <button onclick="refreshOrders()">Refresh</button>
                <button onclick="exportOrdersCSV()">Export CSV</button>
                <button onclick="clearAllOrders()" class="danger-btn">Clear All</button>
                <button onclick="logout()">Log Out</button>
            </div>
        </header>

        <div class="summary-bar">
            <div class="summary-card">
                <span class="summary-label">Total Orders</span>
                <span id="summary-total-orders" class="summary-value">0</span>
            </div>
            <div class="summary-card">
                <span class="summary-label">New Orders</span>
                <span id="summary-new-orders" class="summary-value">0</span>
            </div>
            <div class="summary-card">
                <span class="summary-label">Total Revenue</span>
                <span id="summary-revenue" class="summary-value">₱0.00</span>
            </div>
        </div>

        <div id="orders-list" class="orders-list">
            <!-- Orders are rendered here -->
        </div>
    </div>

    <script type="module" src="admin.js"></script>
</body>
</html>
