<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IHarbor Admin - Orders</title>
    <link rel="stylesheet" href="admin.css">
    <!-- Leaflet (OpenStreetMap) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        /* ── Map Modal ──────────────────────────────────────── */
        #admin-map-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.6);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }
        #admin-map-modal.show { display: flex; }
        .admin-map-box {
            background: #fff;
            border-radius: 18px;
            box-shadow: 0 20px 60px rgba(0,0,0,.3);
            padding: 24px;
            width: 90%;
            max-width: 680px;
            animation: mapPop .25s ease;
        }
        @keyframes mapPop {
            from { transform: scale(.94); opacity: 0; }
            to   { transform: scale(1);  opacity: 1; }
        }
        .admin-map-box h3 {
            margin: 0 0 6px;
            font-size: 1.1rem;
            color: #1a5e36;
        }
        .admin-map-box p.map-sub {
            margin: 0 0 14px;
            font-size: .82rem;
            color: #7f8c8d;
        }
        #admin-order-map {
            width: 100%;
            height: 340px;
            border-radius: 12px;
            border: 1.5px solid #dfe6e9;
        }
        .admin-map-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 14px;
            gap: 10px;
            flex-wrap: wrap;
        }
        #admin-map-address-label {
            font-size: .82rem;
            color: #555;
            flex: 1;
        }
        #admin-map-osm-link {
            font-size: .82rem;
            color: #27ae60;
            font-weight: 600;
            text-decoration: none;
        }
        #admin-map-osm-link:hover { text-decoration: underline; }
        #admin-map-close-btn {
            padding: 9px 22px;
            background: #e74c3c;
            color: #fff;
            border: none;
            border-radius: 20px;
            font-weight: 700;
            cursor: pointer;
            font-size: .88rem;
        }
        /* View Pin button in order cards */
        .map-pin-btn {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: #fff;
            border: none;
            padding: 7px 14px;
            border-radius: 16px;
            font-size: .82rem;
            font-weight: 700;
            cursor: pointer;
            transition: opacity .2s;
            white-space: nowrap;
        }
        .map-pin-btn:hover { opacity: .88; }
        .no-pin-label {
            font-size: .78rem;
            color: #bdc3c7;
            font-style: italic;
        }
    </style>
</head>
<body>

    <!-- Login Screen -->
    <div id="login-screen" class="login-screen">
        <div class="login-box">
            <h1>IHarbor Admin</h1>
            <p>Enter the admin password to view orders.</p>
            <input type="password" id="admin-password" placeholder="Password" />
            <button onclick="checkLogin()">Login</button>
            <p id="login-error" class="login-error"></p>
        </div>
    </div>

    <!-- Admin Dashboard -->
    <div id="admin-dashboard" class="admin-dashboard" style="display:none;">
        <header class="admin-header">
            <h1>IHarbor — Orders</h1>
            <div class="admin-actions">
                <button onclick="refreshOrders()">Refresh</button>
                <button onclick="exportOrdersCSV()">Export CSV</button>
                <button onclick="clearAllOrders()" class="danger-btn">Clear All</button>
                <button onclick="logout()">Log Out</button>
            </div>
        </header>

        <div class="summary-bar">
            <div class="summary-card">
                <span class="summary-label">Total Orders</span>
                <span id="summary-total-orders" class="summary-value">0</span>
            </div>
            <div class="summary-card">
                <span class="summary-label">New Orders</span>
                <span id="summary-new-orders" class="summary-value">0</span>
            </div>
            <div class="summary-card">
                <span class="summary-label">Total Revenue</span>
                <span id="summary-revenue" class="summary-value">₱0.00</span>
            </div>
        </div>

        <div id="orders-list" class="orders-list">
            <!-- Orders are rendered here -->
        </div>
    </div>

    <!-- ── Admin Map Modal ────────────────────────────────── -->
    <div id="admin-map-modal">
        <div class="admin-map-box">
            <h3>📍 Customer Pin Location</h3>
            <p class="map-sub">Exact location the customer dropped on the map during checkout.</p>
            <div id="admin-order-map"></div>
            <div class="admin-map-footer">
                <span id="admin-map-address-label"></span>
                <a id="admin-map-osm-link" href="#" target="_blank" rel="noopener">Open in OpenStreetMap ↗</a>
                <button id="admin-map-close-btn" onclick="closeAdminMap()">Close</button>
            </div>
        </div>
    </div>

    <script type="module" src="admin.js"></script>
</body>
</html>
